<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coding Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
    h1 { color: #333; }
    #chat-box { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
    .user-msg { text-align: right; color: blue; margin: 8px 0; }
    .ai-msg { text-align: left; color: green; margin: 8px 0; }
    textarea { width: 100%; height: 80px; padding: 8px; font-size: 14px; }
    button { margin-top: 8px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>p5.js Coding Assistant</h1>
  <p>Ask me anything about your code or p5.js!</p>
  <div id="chat-box"></div>
  <textarea id="user-input" placeholder="Type your coding question here..."></textarea>
  <button onclick="sendMessage()">Send</button>

  <script>
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const message = input.value.trim();
      if (!message) return;

      chatBox.innerHTML += `<div class="user-msg"><strong>You:</strong> ${message}</div>`;
      input.value = '';

      const response = await fetch('https://ai-server-4vmz.onrender.com/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      const data = await response.json();
      chatBox.innerHTML += `<div class="ai-msg"><strong>Assistant:</strong> ${data.reply}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
