<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>p5.js Coding Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
    header { background: #16213e; padding: 16px 24px; font-size: 20px; font-weight: bold; color: #00d4ff; border-bottom: 2px solid #0f3460; }
    #chat-box { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .user-bubble { align-self: flex-end; background: #0f3460; padding: 12px 16px; border-radius: 12px 12px 0 12px; max-width: 70%; }
    .ai-bubble { align-self: flex-start; background: #16213e; padding: 12px 16px; border-radius: 12px 12px 12px 0; max-width: 85%; width: 100%; }
    .ai-bubble p { margin-bottom: 10px; line-height: 1.6; }
    .code-block { background: #0d0d0d; border-radius: 8px; margin: 10px 0; overflow: hidden; }
    .code-header { background: #7c3aed; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .copy-btn { background: white; color: #7c3aed; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .copy-btn:hover { background: #f0e6ff; }
    pre { padding: 16px; overflow-x: auto; font-size: 13px; line-height: 1.6; counter-reset: line; }
    pre code { color: #a8ff78; }
    .thinking { color: #888; font-style: italic; }
    #input-area { background: #16213e; padding: 16px 24px; border-top: 2px solid #0f3460; display: flex; gap: 12px; align-items: flex-end; }
    textarea { flex: 1; background: #0f3460; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 15px; resize: none; height: 60px; outline: none; }
    textarea::placeholder { color: #888; }
    button#send-btn { background: #7c3aed; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; cursor: pointer; height: 60px; }
    button#send-btn:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <header>p5.js Coding Assistant</header>
  <div id="chat-box"></div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Ask a coding question about your p5.js project..." onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    function formatResponse(text) {
      const parts = text.split(/(```[\s\S]*?```)/g);
      let html = '';
      parts.forEach(part => {
        if (part.startsWith('```')) {
          const lines = part.split('\n');
          const lang = lines[0].replace('```', '').trim() || 'javascript';
          const code = lines.slice(1, -1).join('\n');
          const id = 'code-' + Math.random().toString(36).substr(2, 9);
          html += `
            <div class="code-block">
              <div class="code-header">
                <span>${lang}</span>
                <button class="copy-btn" onclick="copyCode('${id}')">Copy</button>
              </div>
              <pre><code id="${id}">${escapeHtml(code)}</code></pre>
            </div>`;
        } else {
          const escaped = escapeHtml(part).replace(/\n/g, '<br>');
          if (escaped.trim()) html += `<p>${escaped}</p>`;
        }
      });
      return html;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function copyCode(id) {
      const code = document.getElementById(id).innerText;
      navigator.clipboard.writeText(code);
      event.target.innerText = 'Copied!';
      setTimeout(() => event.target.innerText = 'Copy', 2000);
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const message = input.value.trim();
      if (!message) return;

      chatBox.innerHTML += `<div class="user-bubble">${escapeHtml(message)}</div>`;
      input.value = '';
      chatBox.innerHTML += `<div class="ai-bubble thinking" id="thinking">Claude is thinking...</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch('https://ai-server-4vmz.onrender.com/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await response.json();
        document.getElementById('thinking').remove();
        const bubble = document.createElement('div');
        bubble.className = 'ai-bubble';
        bubble.innerHTML = formatResponse(data.reply);
        chatBox.appendChild(bubble);
      } catch(err) {
        document.getElementById('thinking').remove();
        const bubble = document.createElement('div');
        bubble.className = 'ai-bubble';
        bubble.innerText = 'Something went wrong. Please try again.';
        chatBox.appendChild(bubble);
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
